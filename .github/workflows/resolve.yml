name: rule merger

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

# ✅ 修复 1：显式赋予推送代码的权限
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # ✅ 修复 2：使用正确的官方最新版本 v4
      - uses: actions/checkout@v4

      # ✅ 修复 2：使用正确的官方最新版本 v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Set up Mihomo latest
        run: |
          LATEST_TAG=$(curl -fsSL https://github.com/MetaCubeX/mihomo/releases/latest/download/version.txt)
          curl -fsSL -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/${LATEST_TAG}/mihomo-linux-amd64-${LATEST_TAG}.gz
          gunzip mihomo.gz
          sudo mv mihomo /usr/local/bin/
          sudo chmod +x /usr/local/bin/mihomo
          mihomo -v

      - name: Run script
        run: python rule_merger.py

      # 保留你的时间戳获取逻辑
      - name: Get current time
        id: time
        run: echo "TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      # ✅ 修复 3：废弃危险的 rm -rf 逻辑，改用专业的产物部署插件
      - name: Deploy to release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release           # 指定目标分支
          publish_dir: ./output             # 指定要推送的目录（假设你的脚本将文件生成在此处）
          force_orphan: true                # 清理该分支的历史记录，防止仓库体积无限膨胀
          commit_message: "🚀 Update at ${{ steps.time.outputs.TIME }}"
          enable_jekyll: true               # 保持分支干净，不生成额外隐藏文件
